server {
    listen 8080;
    server_name ads-b.hijs.net;

    root /usr/share/nginx/html;
    index index.html;

    # Readsb Extended API
    location /re-api/ {
        proxy_pass http://127.0.0.1:30154/re-api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin "*";
    }

    # "Live" data: NO caching
    location /data/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Access-Control-Allow-Origin "*";
        expires off;
    }

    # Traces, compressed, but with extension .json
    location /data/traces/ {
        root /usr/share/nginx/html;
        gzip off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Access-Control-Allow-Origin "*";
        add_header Content-Encoding "gzip";
    }

    # History (Chunks)
    location /chunks/ {
        root /usr/share/nginx/html/data;
        gzip_static off;
        location ~ chunk_.*\.gz$ {
            gzip off;
            add_header Cache-Control "public, max-age=86400";
            add_header Content-Type "application/json";
            add_header Content-Encoding "gzip";
        }
        location ~ current_.*\.gz$ {
            gzip off;
            add_header Cache-Control "no-cache";
            add_header Content-Type "application/json";
            add_header Content-Encoding "gzip";
        }
        location ~ .*\.json$ {
            gzip on;
            add_header Cache-Control "no-cache";
        }
    }

    # Airplane DB (db2): Cache for a long time
    location /db2/ {
        root /usr/share/nginx/html;
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "public, max-age=86400";
    }

    # Static UI stuff
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # The base
    location / {
        try_files $uri $uri/ =404;
        # index.html zelf liever niet te lang cachen voor updates
        add_header Cache-Control "no-cache";
    }
}
