server {
    listen 8080;
    server_name ads-b.hijs.net;

    root /usr/share/nginx/html;
    index index.html;

    # Readsb Extended API
    location /re-api/ {
        proxy_pass http://127.0.0.1:30154/re-api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin "*";
    }

    # 1. "Live" data: NO caching
    location /data/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Access-Control-Allow-Origin "*";
        expires off;
    }

    # 2. History (Globe/Chunks): AGGRESIVE caching
    # Een bestand als globe_6752.binCraft.zst verandert nooit meer.
    location ~ ^/(globe_history/|upintheair\.json|receiver\.json) {
        root /usr/share/nginx/html/data;
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "public, max-age=2592000, immutable";
        types {
            application/octet-stream zst;
            application/octet-stream binCraft;
        }
    }

    # 3. Airplane DB (db2): Cache for a long time
    location /db2/ {
        root /usr/share/nginx/html;
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "public, max-age=86400";
    }

    # 4. Static UI stuff
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # 5. The base
    location / {
        try_files $uri $uri/ =404;
        # index.html zelf liever niet te lang cachen voor updates
        add_header Cache-Control "no-cache";
    }

    # Compress JSON
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_proxied any;
}
