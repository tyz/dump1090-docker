name: Build Docker images (ARM64)

on:
  push:
    branches: [master]
    paths:
      - 'docker/**'
      - '.github/workflows/build-arm64.yaml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      packages: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            chunks:
              - docker/chunks/**
              - .github/workflows/build-arm64.yaml
            readsb:
              - docker/readsb/**
              - .github/workflows/build-arm64.yaml
            tar1090:
              - docker/tar1090/**
              - .github/workflows/build-arm64.yaml

  docker-build-arm64:
    needs: changes
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.changes.outputs.packages) }}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Extract the version
        id: version
        run: |
          case ${{ matrix.package }} in
            readsb) NAME=readsb ;;
            *) NAME=tar1090 ;;
          esac
          VERSION=$(curl -s https://raw.githubusercontent.com/wiedehopf/${NAME}/master/version)
          echo "app_version=${VERSION}" | tee -a $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Login to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/adsb-${{ matrix.package }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
            type=raw,value=${{ steps.version.outputs.app_version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/${{ matrix.package }}
          push: ${{ github.event_name != 'pull_request' }}
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docker-adsb-${{ matrix.package }}
          cache-to: type=gha,mode=max,scope=docker-adsb-${{ matrix.package }}
